<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <main class="vh-100 d-flex flex-column align-items-center">
        <section class="w-25 border p-3 m-3">
            <header class="p-3 border">
                <span class="text-uppercase fs-2 fw-bolder text-center">password manager</span>
            </header>
            <form class="d-grid gap-3">
                <input type="text" name="website" id="website-name" placeholder="Enter website name"
                    class="form-control">
                <input type="text" name="UserName" id="username" placeholder="Enter username" class="form-control">
                <input type="password" name="password" id="password" placeholder="Enter password" class="form-control">
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-dark">Submit</button>
                    <button class="btn btn-outline-dark" type="reset">Reset</button>
                </div>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
