<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <main class="vh-100 d-flex justify-content-center align-items-center flex-column gap-4">
        <form class="d-flex gap-3 flex-column container border border-2 shadow rounded w-25 p-4" >
            <label for="distance">Distance (km):</label>
            <input type="text" id="distance" name="distance" class="form-control" required>
            <button type="submit" class="btn btn-primary">Calculate Bill</button>
        </form>

        <div class="container border border-2 shadow rounded w-25 p-4" id="output">
            <span id="billAmount"></span>
            <span id="detail"></span>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
