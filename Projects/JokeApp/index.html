<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>
  <body class="vh-100">
    <header class="bg-primary w-100 text-center p-3">
      <h1>Jokes App</h1>
    </header>
    <main
      class="h-75 d-flex flex-column align-items-center justify-content-center gap-5">
      <div
        class="container border border-black h-50 bg-light text-center text-wrap p-4">
        <p id="setup"></p>

        <p id="delivery"></p>

        <p id="error" class="text-danger"></p>
      </div>

      <button class="text-capitalize btn btn-primary" onclick="getNewJoke()">
        Get new joke
      </button>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </body>
</html>
