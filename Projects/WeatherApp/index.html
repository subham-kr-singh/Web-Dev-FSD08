<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather App</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />

      <link rel="stylesheet" href="style.css">
  </head>

  <body class="d-flex justify-content-center align-items-center p-3">
    <!-- Search Box -->

    <div class="search-container p-4" id="searchBox">
      <h1 class="fw-bold text-center mb-3">Weather App</h1>

      <p class="text-secondary text-center mb-4">Search weather by city name</p>

      <div class="d-flex gap-2">
        <input
          type="text"
          id="city"
          class="form-control form-control-lg rounded-4"
          placeholder="Enter city name" />

        <button class="btn btn-dark rounded-4 px-4" onclick="getCity()">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>

    <!-- Weather Container -->

    <div class="container bg-white rounded-5 shadow p-4 d-none" id="weatherBox">
      <!-- Top -->

      <div
        class="d-flex justify-content-between align-items-center border-bottom pb-3">
        <div>
          <h1 class="fw-bold mb-1 text-dark" id="cityName">Bhopal</h1>

          <p class="text-secondary mb-0 text-capitalize" id="mainWeather">
            Clear Sky
          </p>
        </div>

        <img
          id="icon"
          src="https://openweathermap.org/img/wn/10d@2x.png"
          width="110" />
      </div>

      <!-- Temperature -->

      <div class="my-4">
        <h1 class="display-1 fw-bold text-dark" id="temp">28°C</h1>
      </div>

      <!-- Details -->

      <div class="row g-4">
        <div class="col-md-4">
          <div class="border rounded-4 p-4 h-100">
            <p class="text-secondary mb-2">Humidity</p>

            <h2 class="fw-bold text-dark" id="humidity">65%</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border rounded-4 p-4 h-100">
            <p class="text-secondary mb-2">Wind Speed</p>

            <h2 class="fw-bold text-dark" id="wind">12 km/h</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border rounded-4 p-4 h-100">
            <p class="text-secondary mb-2">Pressure</p>

            <h2 class="fw-bold text-dark" id="pressure">1003 hPa</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border rounded-4 p-4 h-100">
            <p class="text-secondary mb-2">Feels Like</p>

            <h2 class="fw-bold text-dark" id="feels">30°C</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border rounded-4 p-4 h-100">
            <p class="text-secondary mb-2">Visibility</p>

            <h2 class="fw-bold text-dark" id="visibility">10 km</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border rounded-4 p-4 h-100">
            <p class="text-secondary mb-2">Clouds</p>

            <h2 class="fw-bold text-dark" id="clouds">20%</h2>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
