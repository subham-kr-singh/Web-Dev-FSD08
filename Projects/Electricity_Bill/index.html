<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <main>
        <div class="container my-5">
            <h1 class="text-center mb-4">Electricity Bill Calculator</h1>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form class="card p-4 shadow d-flex flex-column gap-3">
                        <label for="units" class="form-label">Enter Electricity Units:</label>
                        <input type="number" id="units" class="form-control" min="0" placeholder="e.g., 150">
                        <button class="btn btn-primary" type="submit">Calculate</button>
                        <button class="btn btn-secondary" onclick="reset()">Reset / Clear</button>

                        <div id="billDetails" class="mt-4 d-flex flex-column" style="display: none;">
                            <span id="subtotal"></span>
                            <span id="surcharge"></span>
                            <span id="total"></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
