<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="vh-100">
    <header class="bg-primary text-light text-center p-3">
        <h1>To Do List</h1>
    </header>
    <main class="d-flex flex-column align-items-center">
        <div class="container rounded border shadow m-2 d-flex p-3 gap-4 p-3">
            <input type="text" name="newTask" id="newTask" class="form-control  w-75" placeholder="Enter a task">
            <button id="addTaskButton" class="btn btn-primary w-25" onclick="addNewTask()">Add Task</button>
        </div>

        <div class="container rounded border shadow m-2" id="list">
            <ol id="taskList">
                <!-- <li class="d-flex justify-content-between align-items-center p-2">
                    <span>Task 1</span>
                    <button class="btn btn-danger rounded">Delete <i class="bi bi-trash"></i></button>
                </li> -->
            </ol>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
