<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <main class="vh-100 d-flex justify-content-center align-items-center flex-column">
        <div class="">
            <div class="head border border-3 border-black p-3 mb-4 rounded">
                <h1>Tip Calculator</h1>
            </div>

            <form class="d-flex flex-column gap-3">
                <label for="billAmount">Bill Amount</label>
                <input type="text" name="" id="billAmount" placeholder="Bill Amount" class="form-control">

                <label for="tipPercentage">How was the service?</label>
                <select name="" id="tipPercentage" class="form-control">
                    <option value="">select</option>
                    <option value="25">25% - Top Notch</option>
                    <option value="20">20% - Excellent</option>
                    <option value="15">15% - Good</option>
                    <option value="10">10% - Bad</option>
                    <option value="5">5% - Worst</option>
                </select>
                <label for="totalPeople">Total Number of People</label>
                <input type="text" name="" id="totalPeople" placeholder="Number of People Sharing the Bill"
                    class="form-control">
                <button class="btn btn-primary">Calculate</button>
            </form>

                <div class="d-flex flex-column gap-3 mt-4">
                    <span id="tipAmount"></span>
                    <span id="totalAmountDisplay"></span>
                </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
