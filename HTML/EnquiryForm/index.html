<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav></nav>

    <main>

        <form id="outerDiv">

            <h1>Enquiry Form</h1>

            <p>
                Have questions or need assistance? Fill out the form below
                to connect with our team and explore your opportunities
            </p>

            <div class="form-row">

                <div class="form-item">
                    <label for="name">Person Name*</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-item">
                    <label for="number">Contact Number*</label>
                    <input type="tel" id="number" required>
                </div>

            </div>


            <div class="form-row">

                <div class="form-item">
                    <label for="email">Email*</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-item">
                    <label for="qualification">Qualification*</label>
                    <input type="text" id="qualification">
                </div>

            </div>


            <div class="form-item">
                <label for="collegeName">College/School Name*</label>
                <input type="text" id="collegeName">
            </div>


            <div class="form-row">

                <div class="form-item">
                    <label for="year">Year*</label>

                    <select id="year">
                        <option>Select Year</option>
                        <option>1st Year</option>
                        <option>2nd Year</option>
                        <option>3rd Year</option>
                        <option>4th Year</option>
                    </select>
                </div>

                <div class="form-item">
                    <label for="branch">Branch*</label>
                    <input type="text" id="branch">
                </div>

            </div>





            <div class="form-row">

                <div class="form-item">

                    <label for="information">
                        Source of Information
                        <br>
                        <b>(Only choose 'Received call from institute' if you actually got a call from us)</b>
                    </label>

                    <select id="information">
                        <option>Source of Information</option>
                        <option>Google</option>
                        <option>Instagram</option>
                        <option>Friend</option>
                        <option>Received Call</option>
                    </select>

                </div>

                <div class="form-item">
                    <label for="executive">Name of Executive*</label>
                    <input type="text" id="executive">
                </div>

            </div>


            <button type="submit">Submit</button>

        </form>

    </main>

    <footer></footer>

</body>

</html>
