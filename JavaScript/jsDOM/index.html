<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Css  -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container d-flex mt-5 gap-5 flex-column">
        <input type="text" id="fullname" placeholder="Enter your Name" class="form-control" />
        <input type="text" id="in-city" placeholder="Enter Your City" class="form-control">
        <input type="email" id="in-email" placeholder="Enter yout Email" class="form-control">
        <input type="password" name="" id="in-password" placeholder="Enter your password" class="form-control">
        <button class="btn btn-primary" onclick="submit()">Submit</button>
    </div>

    <hr>

    <div id="data-card" class="border rounded shadow container p-4 d-flex flex-column gap-2 divHide">
        <span class="fw-bold">Name : <span id="name"></span></span>
        <span class="fw-bold">City : <span id="city"></span></span>
        <span class="fw-bold">Email : <span id="email"></span></span>
        <span class="fw-bold">Password : <span id="pass"></span></span>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
