<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Registration Form </title>
</head>
<body>
    <div id="outerDiv">
        <div class="card" id="login">
            <h1>Login</h1>
            <div class="form-item">
                <input type="email" name="email" id="loginEmail" placeholder="Enter Email">
            </div>
            <div class="form-item">
                <input type="password" name="password" id="loginPassword" placeholder="Enter Password">
            </div>
            <div>
                <input type="checkbox" name="" id="">
                <span>Remember Me</span>
            </div>
            <div>
                <a href="#">Forget Password</a>
            </div>
            <div>
                <button>Submit</button>
            </div>
            <div>
                <p>Don't have account <a href="#">Signup Now</a></p>
            </div>
        </div>
        <div class="card" id="register">
            <h1>Register</h1>
            <div class="form-item">
                <input type="text" name="name" id="userName">
            </div>
            <div class="form-item">
                <input type="email" name="email" id="">
            </div>
            <div class="form-item">
                <input type="password" name="" id="">
            </div>
            <div class="form-item">
                <input type="password" name="" id="">
            </div>
            <div>
                <button>
                    Submit
                </button>
            </div>
            <div>
                <p>have account <a href="#">Login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
