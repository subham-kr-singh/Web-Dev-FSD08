<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>
</head>

<body>
    <table>
        <h1>Application Form</h1>


        <label for="firstName"> First Name: </label>
        <input type="text" name="firstName" id="firstName">

        <label for="lastName"> Last Name: </label>
        <input type="text" name="lastName" id="lastName">

        <p></p>

        <label for="dob"> Date of birth: </label>
        <input type="date" name="dob" id="dob">

        <label for="age"> Age: </label>
        <input type="number" name="age" id="age">

        <p></p>

        <label for="gender"> Gender: </label>
        <select name="gender" id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Others</option>
        </select>

        <label for="email"> Email Address: </label>
        <input type="text" name="" id="" placeholder="Enter email address">

        <p></p>

        <label for="experience-level">Experience Level: </label>
        <input type="radio" name="experience-level" id="junior-developer" value="junior-developer">
        <label for="junior-developer"> Junior developer </label>
        <input type="radio" name="experience-level" id="mid-level-developer" value="mid-level-developer">
        <label for="mid-level-developer"> Mid-level developer </label>
        <input type="radio" name="experience-level" id="senior-developer" value="senior-developer">
        <label for="senior-developer"> Senior developer </label>

        <p></p>

        <label for="password">Password: </label>
        <input type="password" name="password" id="password">

        <label for="confirm-password"> Confirm password: </label>
        <input type="password" name="confirm-password" id="confirm-password">

        <p></p>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </table>
</body>

</html>
