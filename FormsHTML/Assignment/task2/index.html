<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
</head>

<body>
    <form>
        <p>Please enter your personal details: </p>
        <div>
            <div>
                <label for="firstName"><u><b>F</b></u>irst name:*</label>
                <input type="text" name="firstName" id="firstName" required>
            </div>

            <div>
                <label for="lastName"><u><b>L</b></u>ast name:*</label>
                <input type="text" name="lastName" id="lastName" required>
            </div>
            <div>
                <label for="streetAddress">Street <u><b>a</b></u>ddress</label>
                <input type="text" name="streetAddress" id="streetAddress">
            </div>

            <div>
                <label for="city"><u><b>T</b></u>own/city:</label>
                <input type="text" name="city" id="city">
            </div>

            <div><label for="zip">Post<u><b>c</b></u>ode/zip:</label>
                <input type="text" name="zip" id="zip">
            </div>

            <div>
                <label for="telephone">Tele<u><b>p</b></u>hone:</label>
                <input type="text" name="telephone" id="telephone">
            </div>

            <div>
                <label for="mobile"><u><b>M</b></u>obile:</label>
                <input type="text" name="mobile" id="mobile">
            </div>

            <div>
                <label for="email"><u><b>E</b></u>mail address:</label>
                <input type="text" name="email" id="email" required>
            </div>

            <p>Fields marked * are required</p>
            <button><u><b>S</b></u>ubmit</button>
        </div>
    </form>
</body>

</html>
