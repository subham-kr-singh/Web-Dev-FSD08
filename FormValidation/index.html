<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <main class="vh-100 d-flex justify-content-center align-items-center">
        <div class="d-flex flex-column gap-3">
            <div>
                <input type="text" name="name" id="name" placeholder="Enter your Name" required>
                <span id="nameError err" class="text-danger "></span>
            </div>
            <div>
                <input type="number" name="" id="number" placeholder="Enter your Phone Number" required>
                <span id="numberError err" class="text-danger "></span>
            </div>
            <div>
                <input type="email" name="" id="email" placeholder="Enter your Email ID" required>
                <span id="emailError err" class="text-danger "></span>
            </div>
            <div>
                <input type="password" name="" id="password" placeholder="Enter your Password" required>
                <span id="passwordError err" class="text-danger "></span>
            </div>

            <button onclick="submit()">Submit</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
