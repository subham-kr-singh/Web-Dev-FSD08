<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <main class="d-flex align-items-center justify-content-center">
        <div
            class="border shadow rounded-4 h-50 d-flex flex-column align-items-center justify-content-center box p-2 gap-2">
            <div class="h-25 w-100 rounded-top-4 fs-1 px-3 border-0 text-black input d-flex justify-content-center flex-column"
                id="display">
                <label for="" class="text-end" id="result">0</label>
            </div>

            <div class="inputs h-75 w-100 calculator">

                <button class="CalcButton shadow" onclick="calculate('AC')">AC</button>
                <button class="CalcButton shadow" onclick="calculate('C')">C</button>
                <button class="CalcButton shadow" onclick="calculate('%')">%</button>
                <button class="CalcButton opsButton shadow" onclick="calculate('/')">/</button>
                <button class="CalcButton shadow" onclick="calculate('7')">7</button>
                <button class="CalcButton shadow" onclick="calculate('8')">8</button>
                <button class="CalcButton shadow" onclick="calculate('9')">9</button>
                <button class="CalcButton opsButton shadow" onclick="calculate('*')">*</button>
                <button class="CalcButton shadow" onclick="calculate('4')">4</button>
                <button class="CalcButton shadow" onclick="calculate('5')">5</button>
                <button class="CalcButton shadow" onclick="calculate('6')">6</button>
                <button class="CalcButton opsButton shadow" onclick="calculate('-')">-</button>
                <button class="CalcButton shadow" onclick="calculate('1')">1</button>
                <button class="CalcButton shadow" onclick="calculate('2')">2</button>
                <button class="CalcButton shadow" onclick="calculate('3')">3</button>
                <button class="CalcButton opsButton shadow" onclick="calculate('+')">+</button>
                <button class="CalcButton shadow" onclick="calculate('0')">0</button>
                <button class="CalcButton shadow" onclick="calculate('.')">.</button>
                <button class="equal rounded-pill shadow" onclick="calculate('=')">=</button>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
